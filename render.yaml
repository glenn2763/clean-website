services:
  - type: web
    name: clean-website
    runtime: node
    plan: free
    repo: https://github.com/glenn2763/clean-website
    branch: master
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: ESPN_S2
        sync: false
      - key: ESPN_SWID
        sync: false
      - key: NODE_ENV
        value: production
